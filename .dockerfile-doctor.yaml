# Dockerfile Doctor configuration
# Place this file in your project root as .dockerfile-doctor.yaml

# Minimum severity to report: info, warning, error
severity: info

# Rule IDs to ignore globally
ignore: []
  # - DD012
  # - DD015

# Per-rule configuration overrides
rules: {}
